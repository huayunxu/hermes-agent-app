name: Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          if [ -n "$ANDROID_HOME" ] && [ -d "$ANDROID_HOME" ]; then
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"
          else
            echo "ERROR: ANDROID_HOME not set by setup-android action"
            ls /usr/local/lib/android/sdk 2>/dev/null || true
            ls /opt/android-sdk 2>/dev/null || true
            find / -name "sdkmanager" 2>/dev/null | head -3
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          echo "=== ENV ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "GRADLE_HOME=$GRADLE_USER_HOME"
          java -version 2>&1
          gradle --version 2>&1
          echo "=== PROJECT ==="
          ls -la app/src/main/java/com/hermes/agent/
          echo "=== BUILD ==="
          gradle assembleDebug --stacktrace --console=plain 2>&1 | tail -200 | tee build-log.txt
          echo "EXIT: $?"

      - name: Upload debug APK (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hermes-agent-build-log
          path: build-log.txt

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: "Build #${{ github.run_number }}"
          body: |
            ## Hermes Agent Android - Build #${{ github.run_number }}

            - Commit: ${{ github.sha }}
            - Author: ${{ github.event.head_commit.author.name || 'Auto build' }}

            ### Changes
            ${{ github.event.head_commit.message || 'Auto build' }}

            ### Download
            下载 APK 安装到 Android 设备即可使用。
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: false